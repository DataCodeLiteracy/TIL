<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinates</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="line_container">
        <div class="line horozontal"></div>
        <div class="line vertical"></div>
      </div>
      <button class="target">
        <i class="fa-solid fa-arrow-up-left"></i>
      </button>
      <div class="tag">
        <div class="client"></div>
        <div class="page"></div>
        <div class="screen"></div>
        <div class="offset"></div>
      </div>
    </div>
    <div class="divBox">
      <div class="divBox-row">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
        <div class="div7"></div>
        <div class="div8"></div>
        <div class="div9"></div>
        <div class="div10"></div>
      </div>
      <div class="divBox-col">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
        <div class="div7"></div>
        <div class="div8"></div>
        <div class="div9"></div>
        <div class="div10"></div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
